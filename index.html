<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Calculator</title><link rel='stylesheet' href='style.css'></head><body><div class='card'><div class='top'><h2>Scientific Calculator</h2><button onclick='toggle()'>🌙</button></div><input id='d' readonly><div class='g'>
<button onclick="c()">C</button><button onclick="bk()">⌫</button><button onclick="f('Math.sqrt(')">√</button><button onclick="a('/')">÷</button>
<button onclick="a('7')">7</button><button onclick="a('8')">8</button><button onclick="a('9')">9</button><button onclick="a('*')">×</button>
<button onclick="a('4')">4</button><button onclick="a('5')">5</button><button onclick="a('6')">6</button><button onclick="a('-')">-</button>
<button onclick="a('1')">1</button><button onclick="a('2')">2</button><button onclick="a('3')">3</button><button onclick="a('+')">+</button>
<button onclick="a('0')">0</button><button onclick="a('.')">.</button><button onclick="a(')')">)</button><button onclick="eq()" class='eq'>=</button>
</div></div><script src='script.js'></script></body></html>
